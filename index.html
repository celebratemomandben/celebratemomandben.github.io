<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorado Springs 2026 Family Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0083B8; --accent: #D9534F; --bg: #f0f4f8;
            --glass: rgba(255, 255, 255, 0.9);
            --fs-h1: clamp(1.5rem, 4vw, 2.5rem);
            --fs-body: clamp(0.85rem, 1vw + 0.4rem, 1rem);
        }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top left, #e0eafc, #cfdef3); margin: 0; padding: clamp(10px, 2vw, 20px); color: #2d3436; }
        .container { max-width: 1300px; margin: auto; }
        
        /* AUTH SECTION */
        .auth-container { max-width: 450px; margin: 0 auto 20px auto; background: var(--glass); padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .auth-input { padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin: 5px; width: 85%; text-transform: uppercase; }
        .btn-unlock { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 90%; margin-top: 10px; }

        /* BENTO GRID */
        .bento-grid { display: grid; gap: 15px; opacity: 0.15; pointer-events: none; transition: 0.5s; grid-template-areas: "sidebar" "video" "info" "chat" "poll" "voters" "chart"; }
        .unlocked { opacity: 1 !important; pointer-events: all !important; }

        @media (min-width: 1100px) {
            .bento-grid { grid-template-columns: repeat(4, 1fr); grid-template-areas: "sidebar video video video" "sidebar video video video" "info info chat chat" "poll poll voters voters" "chart chart chart chart"; }
        }

        .video-module { grid-area: video; } .sidebar-module { grid-area: sidebar; } .info-module { grid-area: info; } 
        .chat-module { grid-area: chat; } .poll-module { grid-area: poll; } .voters-module { grid-area: voters; } .chart-module { grid-area: chart; }

        .bento-item { background: var(--glass); backdrop-filter: blur(12px); border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); overflow: hidden; }
        .video-player { width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; background: #000; position: relative; }
        .video-player iframe { position: absolute; width: 100%; height: 100%; border: none; top:0; left:0; }

        .video-sidebar { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
        .video-item { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; cursor: pointer; text-align: left; font-weight: 600; font-size: 0.85rem; }
        .video-item.active { background: var(--primary); color: white; }

        /* CHAT STYLING */
        .chat-header { background: #eee; padding: 5px 10px; font-size: 0.7rem; font-weight: bold; border-radius: 5px; margin: 10px 0 5px 0; color: #666; }
        .chat-msg { font-size: 0.85rem; padding: 2px 0; border-bottom: 1px solid #f0f0f0; }

        /* CONTACT & REVIEWS */
        .contact-link { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 0.8rem; margin-right: 15px; }
        .review-bubble { background: rgba(0,0,0,0.04); padding: 8px; border-radius: 10px; margin-top: 5px; font-size: 0.8rem; border-left: 3px solid var(--primary); }

        .selection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
        .vote-card input { display: none; }
        .vote-card label { display: block; padding: 10px; background: #fff; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid #eee; font-size: 0.8rem; font-weight: bold; }
        .vote-card input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }
        .voter-tag { background: #e0eafc; padding: 2px 8px; border-radius: 10px; margin: 2px; font-size: 0.7rem; color: var(--primary); display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-container" id="authBox">
        <h2 style="margin:0 0 15px 0">Trip Access</h2>
        <input type="text" id="voterName" class="auth-input" placeholder="FIRST NAME">
        <input type="password" id="voterPass" class="auth-input" placeholder="PASSCODE: ROCKIES">
        <button onclick="unlockApp()" class="btn-unlock">UNLOCK HUB</button>
    </div>

    <h1 id="mainTitle" style="text-align: center;">COLORADO SPRINGS '26</h1>

    <div class="bento-grid" id="appBody">
        <div class="bento-item video-module">
            <div class="video-player">
                <iframe id="mainPlayer" src="" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
            </div>
        </div>

        <div class="bento-item sidebar-module">
            <h3 style="margin-top:0;">📍 DESTINATIONS</h3>
            <div class="video-sidebar" id="sidebar"></div>
        </div>

        <div class="bento-item info-module">
            <h2 id="infoTitle" style="margin-top:0">SELECT A PLACE</h2>
            <div id="contactRow">
                <a id="lnkWeb" href="#" target="_blank" class="contact-link">🌐 WEBSITE</a>
                <span id="txtPhone" class="contact-link" style="color:#333">📞 PHONE</span>
            </div>
            <div id="costArea" style="font-weight:bold; color:var(--primary); margin: 8px 0; font-size:0.9rem;"></div>
            <p id="infoDesc" style="font-size:0.85rem;"></p>
            <div id="reviewSection"></div>
        </div>

        <div class="bento-item chat-module">
            <h3 style="margin:0;">💬 FAMILY CHAT</h3>
            <div id="chatMessages" style="height:150px; overflow-y:auto; margin:10px 0;"></div>
            <div style="font-size:0.75rem; margin-bottom:5px;">
                <input type="checkbox" id="contextLock" checked> Tag as <span id="contextName" style="font-weight:bold">General</span>?
            </div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chatInput" style="flex-grow:1; padding:8px; border-radius:8px; border:1px solid #ddd;" placeholder="Type message...">
                <button onclick="sendChat()" style="background:var(--primary); border:none; color:white; padding:8px 12px; border-radius:8px; cursor:pointer;">↑</button>
            </div>
        </div>

        <div class="bento-item poll-module">
            <h3 style="text-align:center; margin-top:0;">🗳️ YOUR PICKS (CHOOSE 3-5)</h3>
            <div id="pollOptions" class="selection-grid"></div>
            <button onclick="submitVotes()" style="width:100%; background:#2ecc71; color:white; border:none; padding:15px; border-radius:15px; font-weight:800; margin-top:10px; cursor:pointer;">UPDATE MY PICKS</button>
        </div>

        <div class="bento-item voters-module">
            <h3 style="margin-top:0;">👥 SUPPORTERS OF TOP 3</h3>
            <div id="voterDetails" style="font-size:0.8rem;"></div>
        </div>

        <div class="bento-item chart-module">
            <h2 style="text-align:center; margin-top:0;">📊 LEADERBOARD</h2>
            <canvas id="voteChart" height="100"></canvas>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, get, child, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

 const firebaseConfig = {
  apiKey: "AIzaSyAByJd5SpzqtK7LAA80I-nONrXQqhgG2uQ",
  authDomain: "celebratemomandben.firebaseapp.com",
  projectId: "celebratemomandben",
  storageBucket: "celebratemomandben.firebasestorage.app",
  messagingSenderId: "567044784692",
  appId: "1:567044784692:web:dba496160575757517c061",
  measurementId: "G-6H8FYLXRG8"
};

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const locations = [
    { name: "Garden of the Gods", vidId: "D-ZDwccPNcg", cost: "Free", web: "https://gardenofgods.com", phone: "719-634-6666", desc: "Red rock spires.", reviews: ["Best sunrise!", "Paved paths."] },
    { name: "Pikes Peak Cog Railway", vidId: "tBFQgVrZkGI", cost: "$67+", web: "https://www.cograilway.com", phone: "719-685-5401", desc: "Highest cog train.", reviews: ["Dress warm!", "Summit donuts!"] },
    { name: "Cheyenne Mountain Zoo", vidId: "qOkrFI00o9k", cost: "$35+", web: "https://www.cmzoo.org", phone: "719-633-9925", desc: "Mountain zoo.", reviews: ["Feed giraffes.", "Steep hike."] },
    { name: "Seven Falls", vidId: "3oBjVHj4iTk", cost: "$25+", web: "https://www.sevenfalls.com", phone: "855-923-7272", desc: "Box canyon waterfalls.", reviews: ["224 stairs.", "Night lights."] },
    { name: "Santa's Workshop", vidId: "T-cNRxYanxU", cost: "$35 wristband", web: "https://santas-colo.com", phone: "719-684-9432", desc: "Vintage theme park.", reviews: ["Grandkids loved it.", "Met Santa!"] },
    { name: "Olympic Museum", vidId: "0QHfykjuoYk", cost: "$25+", web: "https://usopm.org", phone: "719-497-1234", desc: "Interactive sports.", reviews: ["Interactive games.", "Accessible."] },
    { name: "Manitou Penny Arcade", vidId: "fDsdIW5v-RE", cost: "Pay-per-play", web: "https://manitousprings.org", phone: "719-685-5089", desc: "400+ vintage games.", reviews: ["Take quarters!", "Nostalgic."] },
    { name: "Royal Gorge Bridge", vidId: "J1prZgmo67g", cost: "$35+", web: "https://royalgorgebridge.com", phone: "719-275-7507", desc: "Highest US bridge.", reviews: ["Gondola included.", "Breathtaking!"] },
    { name: "Cave of the Winds", vidId: "8DWiM4ap9JY", cost: "$29+", web: "https://caveofthewinds.com", phone: "719-685-5444", desc: "Tours & cliff swings.", reviews: ["Kids loved it.", "Terrifying swing!"] },
    { name: "Territory Days Fest", vidId: "_AZMHsejSQ4", cost: "Free Entry", web: "https://shopoldcoloradocity.com", phone: "719-577-4112", desc: "Street fair May 23-25.", reviews: ["Turkey legs!", "Use the shuttle."] }
  ];

  let currentLoc = locations[0];
  const sidebar = document.getElementById('sidebar');
  const pollOptions = document.getElementById('pollOptions');

  locations.forEach((loc, index) => {
    sidebar.innerHTML += `<button class="video-item" onclick="loadLoc(${index})">${loc.name}</button>`;
    pollOptions.innerHTML += `<div class="vote-card"><input type="checkbox" class="vote-check" id="v-${index}" value="${loc.name}"><label for="v-${index}">${loc.name}</label></div>`;
  });

  window.unlockApp = async function() {
    const name = document.getElementById('voterName').value.trim().toUpperCase();
    const pass = document.getElementById('voterPass').value.trim().toLowerCase();
    if (name && (pass === "rockies")) {
        document.getElementById('appBody').classList.add('unlocked');
        document.getElementById('authBox').style.display = "none";
        document.getElementById('mainTitle').innerText = `${name}'S TRIP HUB`;
        loadLoc(0);
        const snap = await get(child(ref(db), `userVotes/${name}`));
        if (snap.exists()) {
            const v = snap.val();
            document.querySelectorAll('.vote-check').forEach(cb => cb.checked = v.includes(cb.value));
        }
    } else { alert("Name + Passcode 'rockies' required!"); }
  }

  window.loadLoc = (i) => {
    const loc = locations[i]; currentLoc = loc;
    document.getElementById('mainPlayer').src = `https://www.youtube-nocookie.com/embed/${loc.vidId}?autoplay=1&rel=0&origin=${window.location.origin}`;
    document.getElementById('infoTitle').innerText = loc.name.toUpperCase();
    document.getElementById('infoDesc').innerText = loc.desc;
    document.getElementById('contextName').innerText = loc.name;
    document.getElementById('costArea').innerText = "EST. COST: " + loc.cost;
    document.getElementById('lnkWeb').href = loc.web;
    document.getElementById('txtPhone').innerText = "📞 " + loc.phone;
    document.getElementById('reviewSection').innerHTML = loc.reviews.map(r => `<div class="review-bubble">"${r}"</div>`).join('');
    document.querySelectorAll('.video-item').forEach((btn, idx) => btn.classList.toggle('active', idx === i));
  };

  window.sendChat = () => {
    const msg = document.getElementById('chatInput').value.trim();
    const name = document.getElementById('voterName').value.trim().toUpperCase();
    if(msg && name) {
        const room = document.getElementById('contextLock').checked ? currentLoc.name : "General";
        push(ref(db, 'globalChat'), { user: name, msg, room, time: serverTimestamp() });
        document.getElementById('chatInput').value = "";
    }
  };

  onValue(ref(db, 'globalChat'), (snap) => {
    const chatBox = document.getElementById('chatMessages'); chatBox.innerHTML = "";
    let msgs = []; snap.forEach(c => { let d = c.val(); d.time = d.time || 0; msgs.push(d); });
    msgs.sort((a,b) => b.time - a.time);
    let last = "";
    msgs.forEach(d => {
        if(d.room !== last) { chatBox.innerHTML += `<div class="chat-header">${d.room.toUpperCase()}</div>`; last = d.room; }
        chatBox.innerHTML += `<div class="chat-msg"><strong>${d.user}:</strong> ${d.msg}</div>`;
    });
  });

  window.submitVotes = function() {
    const name = document.getElementById('voterName').value.trim().toUpperCase();
    const v = Array.from(document.querySelectorAll('.vote-check:checked')).map(cb => cb.value);
    if (v.length < 3 || v.length > 5) return alert("SELECT 3-5 ITEMS!");
    set(ref(db, `userVotes/${name}`), v); alert("VOTES UPDATED!");
  }

  onValue(ref(db, 'userVotes'), (snap) => {
    const data = snap.val() || {}; const counts = {}; const supporters = {};
    locations.forEach(l => { counts[l.name] = 0; supporters[l.name] = []; });
    Object.entries(data).forEach(([u, l]) => { l.forEach(p => { counts[p]++; supporters[p].push(u); })});
    const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
    let h = "";
    for(let i=0; i<3; i++) {
        if(sorted[i] && sorted[i][1]>0) h += `<div style="margin-bottom:8px;"><strong>#${i+1} ${sorted[i][0].toUpperCase()}</strong><br>${supporters[sorted[i][0]].map(p => `<span class="voter-tag">${p}</span>`).join("")}</div>`;
    }
    document.getElementById('voterDetails').innerHTML = h || "Voting in progress...";
    myChart.data.labels = sorted.map(e => e[0]);
    myChart.data.datasets[0].data = sorted.map(e => e[1]);
    myChart.update();
  });

  const ctx = document.getElementById('voteChart').getContext('2d');
  let myChart = new Chart(ctx, { type: 'bar', data: { labels: [], datasets: [{ label: 'Votes', data: [], backgroundColor: 'rgba(0, 131, 184, 0.7)', borderRadius: 10 }] }, options: { indexAxis: 'y', plugins: { legend: { display: false } } } });
</script>
</body>
</html>
