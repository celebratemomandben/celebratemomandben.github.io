<!DOCTYPE html>
<html>
<head>
    <title>Colorado Springs Family Poll</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, button { padding: 10px; font-size: 16px; margin: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #0083B8; color: white; cursor: pointer; border: none; }
        canvas { margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏔️ Colorado Springs Trip Poll</h1>
    <p>May 23-30 | Vote for your top activity!</p>

    <select id="placeSelect">
        <option>Garden of the Gods</option>
        <option>Pikes Peak Cog Railway</option>
        <option>Cheyenne Mountain Zoo</option>
        <option>Manitou Penny Arcade</option>
        <option>Royal Gorge Bridge</option>
        <option>Cave of the Winds</option>
        <option>Seven Falls</option>
        <option>US Olympic Museum</option>
        <option>Air Force Academy</option>
        <option>Manitou Cliff Dwellings</option>
    </select>
    <button onclick="castVote()">Cast My Vote!</button>

    <canvas id="voteChart" width="400" height="200"></canvas>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // TODO: Replace with YOUR actual config from Firebase Console
 const firebaseConfig = {
  apiKey: "AIzaSyAByJd5SpzqtK7LAA80I-nONrXQqhgG2uQ",
  authDomain: "celebratemomandben.firebaseapp.com",
  projectId: "celebratemomandben",
  storageBucket: "celebratemomandben.firebasestorage.app",
  messagingSenderId: "567044784692",
  appId: "1:567044784692:web:dba496160575757517c061",
  measurementId: "G-6H8FYLXRG8"
};

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Initialize Chart.js
  const ctx = document.getElementById('voteChart').getContext('2d');
  let myChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: [], datasets: [{ label: 'Votes', data: [], backgroundColor: '#0083B8' }] },
      options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });

  // Function to Vote
  window.castVote = function() {
      const place = document.getElementById('placeSelect').value;
      const voteRef = ref(db, 'votes/' + place.replace(/\s+/g, '_'));
      
      // Atomic increment so two people voting at once don't crash it
      runTransaction(voteRef, (currentValue) => {
          return (currentValue || 0) + 1;
      });
  };

  // Listen for Realtime Changes
  onValue(ref(db, 'votes'), (snapshot) => {
      const data = snapshot.val();
      if (data) {
          const labels = Object.keys(data).map(k => k.replace(/_/g, ' '));
          const values = Object.values(data);
          
          myChart.data.labels = labels;
          myChart.data.datasets[0].data = values;
          myChart.update();
      }
  });
</script>

</body>
</html>
